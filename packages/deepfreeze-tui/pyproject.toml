[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "deepfreeze-tui"
version = "2.0.0"
description = "Terminal UI for deepfreeze CLI"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Deepfreeze Team"}
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Environment :: Console",
]
dependencies = [
    "textual>=0.40.0",
    "rich>=13.0.0",
    "httpx>=0.24.0",
    "pyyaml>=6.0.0",
]

[project.optional-dependencies]
local = [
    "deepfreeze-service>=1.0.0",
    "elasticsearch8>=8.0.0",
]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
]

[project.scripts]
deepfreeze-tui = "deepfreeze_tui.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["deepfreeze_tui"]
